---
- name: Prepare host for AWX
  hosts: all
  become: true
  gather_facts: true

  vars:
    awx_user: awx_user
    zabbix_hostname: "{{ ansible_fqdn }}"
    zabbix_agent_listen_port: 10050
    zabbix_version: "7.4" 
    # Map repo URLs by OS Family
    zabbix_repo_url:
      Debian: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/debian/pool/main/z/zabbix-release/zabbix-release_latest_7.0+debian12_all.deb"
      RedHat: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/release/alma/10/noarch/zabbix-release-latest-{{ zabbix_version }}.el10.noarch.rpm"

  tasks:
    - name: Set system hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: OS-Specific Firewall Management
      service:
        name: firewalld
        state: stopped
        enabled: false
      when: ansible_os_family == "RedHat"
      ignore_errors: true

    - name: Ensure Python 3 is present
      package:
        name: python3
        state: present

    - name: Manage AWX User
      user:
        name: "{{ awx_user }}"
        shell: /bin/bash
        create_home: yes
        groups: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
        append: yes

    - name: Set up AWX public key and Sudoers
      block:
        - name: Add authorized key
          authorized_key:
            user: "{{ awx_user }}"
            key: "{{ awx_pubkey }}"

        - name: Allow passwordless sudo
          copy:
            dest: "/etc/sudoers.d/{{ awx_user }}"
            content: "{{ awx_user }} ALL=(ALL) NOPASSWD:ALL"
            mode: "0440"

    - name: Install basic packages
      package:
        name: [git, curl, wget, open-vm-tools]
        state: present

    - name: Install and configure TuneD (RedHat only)
      block:
        - name: Install tuned
          package:
            name: tuned
            state: present

        - name: Start and enable tuned
          service:
            name: tuned
            state: started
            enabled: true

        - name: Apply virtual-guest profile
          command: tuned-adm profile virtual-guest
          register: tuned_result
          changed_when: "'Current active profile: virtual-guest' not in tuned_result.stdout"
      when: ansible_os_family == "RedHat"

    ##########################
    # Tailscale setup
    ##########################
    - name: Install Tailscale via official script
      shell: "curl -fsSL https://tailscale.com/install.sh | sh"
      args:
        creates: /usr/bin/tailscale
      when: tailscale_auth_key | default(tailscale_client_secret) | default('') != ""

    - name: Bring up tailscale
      command: >
        tailscale up 
        --authkey="{{ tailscale_auth_key | default(tailscale_client_secret) }}" 
        --advertise-tags=tag:server
      register: ts_up
      changed_when: ts_up.rc == 0
      failed_when: false
      when: tailscale_auth_key | default(tailscale_client_secret) | default('') != ""

    ##########################
    # Zabbix installation
    ##########################
    - name: Install Zabbix Repository
      block:
        - name: Install Zabbix repo (RedHat)
          dnf:
            name: "{{ zabbix_repo_url.RedHat }}"
            state: present
            disable_gpg_check: yes
          when: ansible_os_family == "RedHat"

        - name: Install Zabbix repo (Debian)
          apt:
            deb: "{{ zabbix_repo_url.Debian }}"
            state: present
          when: ansible_os_family == "Debian"

    - name: Install Zabbix agent 2
      package:
        name: zabbix-agent2
        state: present
        update_cache: yes

    - name: Configure Zabbix Agent 2
      copy:
        dest: /etc/zabbix/zabbix_agent2.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          Server={{ zabbix_server }}
          ServerActive={{ zabbix_server }}
          Hostname={{ zabbix_hostname }}
          ListenPort={{ zabbix_agent_listen_port }}
          HostMetadata=autoreg_linux
          LogFile=/var/log/zabbix/zabbix_agent2.log
          LogFileSize=0
      notify: Restart Zabbix agent 2

    - name: Enable and start Zabbix agent 2
      service:
        name: zabbix-agent2
        state: started
        enabled: true

  handlers:
    - name: Restart Zabbix agent 2
      service:
        name: zabbix-agent2
        state: restarted
