---
- name: Prepare host for AWX and Zabbix
  hosts: all
  become: true
  gather_facts: true

  vars:
    awx_user: awx_user
    awx_pubkey: ""
    zabbix_hostname: "{{ ansible_fqdn }}"
    zabbix_agent_listen_port: 10050
    zabbix_version: "7.4"

  tasks:
    - name: Ensure Python is installed (Debian)
      raw: test -e /usr/bin/python3 || (apt update && apt install -y python3)
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Ensure Python is installed (RedHat)
      raw: test -e /usr/bin/python3 || (dnf install -y python3)
      changed_when: false
      when: ansible_os_family == "RedHat"

    - name: Create AWX user
      user:
        name: "{{ awx_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Ensure sudo group membership
      user:
        name: "{{ awx_user }}"
        groups: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
        append: yes
        
    - name: Set up AWX public key
      authorized_key:
        user: "{{ awx_user }}"
        key: "{{ awx_pubkey }}"

    - name: Allow passwordless sudo
      copy:
        dest: "/etc/sudoers.d/{{ awx_user }}"
        content: "{{ awx_user }} ALL=(ALL) NOPASSWD:ALL"
        mode: "0440"

    - name: Install basic packages
      package:
        name:
          - git
          - curl
          - wget
        state: present

    ##########################
    # Tailscale setup
    ##########################

    - name: Set auth key from client secret if needed
      set_fact:
        tailscale_auth_key: "{{ tailscale_client_secret }}"
      when: 
        - (tailscale_auth_key | default("")) == ""
        - (tailscale_client_secret | default("")) != ""

    - name: Install Tailscale
      shell: |
        set -euo pipefail
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale
      when: (tailscale_auth_key | default("")) != ""

    - name: Check tailscale status
      command: tailscale status
      register: tailscale_status
      failed_when: false
      changed_when: false
      when: (tailscale_auth_key | default("")) != ""

    - name: Bring up tailscale
      command: >
        tailscale up 
        --authkey="{{ tailscale_auth_key }}" 
        --advertise-tags=tag:server
      when:
        - (tailscale_auth_key | default("")) != ""
        - tailscale_status.rc != 0 or 'Logged out' in tailscale_status.stdout

    ##########################
    # Zabbix installation
    ##########################

    - name: Install Zabbix repository RPM
      dnf:
        name: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/release/alma/10/noarch/zabbix-release-latest-{{ zabbix_version }}.el10.noarch.rpm"
        state: present
        disable_gpg_check: yes
      when: ansible_os_family == "RedHat"

    - name: Install Zabbix agent 2
      dnf:
        name: zabbix-agent2
        state: present
        update_cache: yes
      when: ansible_os_family == "RedHat"

    - name: Overwrite Zabbix Agent 2 configuration
      copy:
        dest: /etc/zabbix/zabbix_agent2.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          Server={{ zabbix_server }}
          ServerActive={{ zabbix_server }}
          Hostname={{ zabbix_hostname }}
          ListenPort={{ zabbix_agent_listen_port }}
          # This line tells Zabbix Server how to categorize this new host
          HostMetadata=autoreg_linux
          LogFile=/var/log/zabbix/zabbix_agent2.log
          LogFileSize=0
          Include=/etc/zabbix/zabbix_agent2.d/*.conf
          ControlSocket=/run/zabbix/agent2.sock
      notify: Restart Zabbix agent 2

    - name: Enable and start Zabbix agent 2 service
      service:
        name: zabbix-agent2
        state: started
        enabled: true

  handlers:
    - name: Delay for 5s
      pause:
        seconds: 5
      listen: "Restart Zabbix agent 2"

    - name: Restart Zabbix agent 2
      service:
        name: zabbix-agent2
        state: restarted
      listen: "Restart Zabbix agent 2"
