---
- name: Gather host facts and update AWX
  hosts: all
  gather_facts: yes
  become: true

  tasks:

    - name: Convert facts to JSON
      set_fact:
        host_facts_json: "{{ ansible_facts | to_json }}"

    - name: Push host facts via REST API
      uri:
        url: "{{ awx_url }}/api/v2/hosts/{{ inventory_hostname }}/facts/"
        method: POST
        headers:
          Authorization: "Bearer {{ awx_token }}"
          Content-Type: "application/json"
        body: "{{ ansible_facts | to_json }}"
        body_format: json
        validate_certs: false
